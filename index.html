<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>ScanKorea MVP</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root { --bg: #f4f6f8; --surface: #ffffff; --text: #111111; --sub: #6b7280; --line: #e5e7eb; --primary: #111111; --primary-text: #ffffff; --soft: #eef2f7; --link: #2563eb; --danger: #dc2626; --radius-lg: 20px; --radius-md: 16px; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
    body { min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
    .hidden { display: none !important; }
    .app-screen { min-height: 100vh; min-height: 100dvh; padding: calc(20px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 18px; }
    .screen-inner { width: 100%; max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; flex: 1; }
    
    .hero-block { padding-top: 8px; }
    .hero-title { font-size: 30px; line-height: 1.2; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.02em; }
    .hero-desc { margin: 0; color: var(--sub); font-size: 15px; line-height: 1.5; }
    
    .lang-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .lang-btn, .primary-btn, .secondary-btn { width: 100%; min-height: 60px; border: none; border-radius: 16px; padding: 16px 18px; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.12s ease; }
    .lang-btn, .primary-btn { background: var(--primary); color: var(--primary-text); }
    .secondary-btn { background: var(--soft); color: var(--text); }
    
    .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .top-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .text-btn { border: none; background: transparent; color: var(--link); font-size: 14px; font-weight: 700; cursor: pointer; padding: 8px 0; }
    
    .panel { background: var(--surface); border-radius: var(--radius-lg); padding: 18px; box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06); }
    
    #reader { width: 100%; border-radius: 18px; overflow: hidden; background: #000; margin-bottom: 14px; display: none; min-height: 250px; position: relative; }
    #reader video { width: 100% !important; object-fit: cover !important; }

    .scan-guide-box { border: 2px dashed #cfd6df; border-radius: 18px; background: #fafbfc; min-height: 180px; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; margin-bottom: 14px; }
    .scan-guide-text { margin: 0; font-size: 15px; line-height: 1.6; color: var(--sub); }
    
    .field input { width: 100%; min-height: 56px; border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; font-size: 16px; outline: none; }
    .status-message { margin-top: 12px; font-size: 14px; color: var(--sub); }
    .status-message.error { color: var(--danger); font-weight: 700; }
    
    .product-brand { margin: 0 0 6px; font-size: 14px; font-weight: 800; color: #4b5563; }
    .product-name { font-size: 28px; font-weight: 800; margin: 0 0 10px; }
    .meta-chip { display: inline-flex; align-items: center; min-height: 32px; padding: 6px 10px; border-radius: 999px; background: #eef2f7; color: #374151; font-size: 13px; font-weight: 700; margin-right: 4px; }
    
    .section { background: var(--surface); border-radius: 18px; padding: 16px; box-shadow: 0 6px 24px rgba(15, 23, 42, 0.05); margin-bottom: 10px; }
    .section-title { margin: 0 0 8px; font-size: 14px; font-weight: 800; color: #4b5563; }
    .section-body { margin: 0; font-size: 15px; line-height: 1.65; white-space: pre-wrap; }
    .bottom-actions { display: flex; gap: 10px; margin-top: 20px; }
    .bottom-actions button { flex: 1; }
  </style>
</head>
<body>

  <section id="language-screen" class="app-screen">
    <div class="screen-inner">
      <div class="hero-block"><h1 class="hero-title">Choose your language</h1><p class="hero-desc">Please select your preferred language to continue.</p></div>
      <div class="lang-list">
        <button class="lang-btn" data-lang="ko">한국어</button>
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn" data-lang="ja">日本語</button>
        <button class="lang-btn" data-lang="cn">简体中文</button>
        <button class="lang-btn" data-lang="tw">繁體中文</button>
      </div>
    </div>
  </section>

  <section id="scan-screen" class="app-screen hidden">
    <div class="screen-inner">
      <div class="top-bar">
        <div class="top-title" id="scan-title">Scan Product</div>
        <button class="text-btn" id="change-language-from-scan">Change language</button>
      </div>
      <div class="panel">
        <div id="reader"></div>
        <div class="scan-guide-box" id="scan-placeholder">
          <p class="scan-guide-text" id="scan-guide-text">Scan the barcode on the product.</p>
        </div>
        <button class="primary-btn" id="start-camera-btn" style="margin-bottom: 12px;">Open Camera</button>
        <div class="field"><input type="text" id="barcode-input" placeholder="Enter barcode manually" /></div>
        <button class="secondary-btn" id="search-btn">Search product</button>
        <p id="status-message" class="status-message hidden"></p>
      </div>
    </div>
  </section>

  <section id="detail-screen" class="app-screen hidden">
    <div class="screen-inner">
      <div class="top-bar">
        <div class="top-title" id="detail-title">Details</div>
        <button class="text-btn" id="change-language-from-detail">Change language</button>
      </div>
      <div class="panel">
        <p class="product-brand" id="product-brand"></p>
        <h2 class="product-name" id="product-name"></h2>
        <div class="product-meta">
          <span class="meta-chip" id="product-category-chip"></span>
          <span class="meta-chip hidden" id="product-spf-chip"></span>
        </div>
        <p class="product-summary" id="product-summary" style="margin-top: 10px; font-size: 15px; color: var(--sub);"></p>
      </div>
      <div class="section"><h3 class="section-title" id="label-description">Description</h3><p class="section-body" id="product-description"></p></div>
      <div class="section"><h3 class="section-title" id="label-volume">Volume</h3><p class="section-body" id="product-volume"></p></div>
      <div class="section"><h3 class="section-title" id="label-feature">Features</h3><p class="section-body" id="product-feature"></p></div>
      <div class="section"><h3 class="section-title" id="label-usage">How to use</h3><p class="section-body" id="product-usage"></p></div>
      <div class="section"><h3 class="section-title" id="label-caution">Caution</h3><p class="section-body" id="product-caution"></p></div>
      <div class="section"><h3 class="section-title" id="label-tag">Tags</h3><p class="section-body" id="product-tag"></p></div>
      <div class="section"><h3 class="section-title" id="label-ingredient">Ingredients</h3><p class="section-body" id="product-ingredient"></p></div>
      <div class="section hidden" id="section-functional"><h3 class="section-title" id="label-functional">Functional</h3><p class="section-body" id="product-functional"></p></div>
      <div class="bottom-actions"><button class="secondary-btn" id="back-to-scan-btn">Back</button><button class="primary-btn" id="new-scan-btn">Scan again</button></div>
    </div>
  </section>

  <script>
    const firebaseConfig = { databaseURL: "https://scan-korea-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const languageScreen = document.getElementById("language-screen");
    const scanScreen = document.getElementById("scan-screen");
    const detailScreen = document.getElementById("detail-screen");
    const barcodeInput = document.getElementById("barcode-input");
    const searchBtn = document.getElementById("search-btn");
    const statusMessage = document.getElementById("status-message");
    const startCameraBtn = document.getElementById("start-camera-btn");
    const scanPlaceholder = document.getElementById("scan-placeholder");
    const readerElement = document.getElementById("reader");

    const productBrand = document.getElementById("product-brand");
    const productName = document.getElementById("product-name");
    const productCategoryChip = document.getElementById("product-category-chip");
    const productSpfChip = document.getElementById("product-spf-chip");
    const productSummary = document.getElementById("product-summary");
    const productDescription = document.getElementById("product-description");
    const productVolume = document.getElementById("product-volume");
    const productFeature = document.getElementById("product-feature");
    const productUsage = document.getElementById("product-usage");
    const productCaution = document.getElementById("product-caution");
    const productTag = document.getElementById("product-tag");
    const productIngredient = document.getElementById("product-ingredient");
    const sectionFunctional = document.getElementById("section-functional");
    const productFunctional = document.getElementById("product-functional");

    const backToScanBtn = document.getElementById("back-to-scan-btn");
    const newScanBtn = document.getElementById("new-scan-btn");

    let html5QrCode = null;
    let isProcessingScan = false;

    const translations = {
      "ko": {
        scanTitle: "상품 스캔",
        detailTitle: "상세 정보",
        searchBtn: "조회하기",
        cameraBtn: "카메라 열기",
        loading: "조회 중...",
        cameraLoading: "카메라 준비 중...",
        alertDbMissing: "아직 등록되지 않은 상품입니다. 다른 상품을 스캔하거나 바코드를 직접 입력해주세요.",
        alertScanMismatch: "바코드는 인식되었지만 상품정보를 찾지 못했습니다.",
        alertCameraError: "카메라를 실행할 수 없습니다. 브라우저의 카메라 권한을 확인해주세요.",
        alertUnknown: "알 수 없는 오류가 발생했습니다.",
        placeholder: "바코드 번호 직접 입력",
        labels: {
          description: "설명",
          volume: "용량",
          feature: "특징",
          usage: "사용법",
          caution: "주의사항",
          tag: "태그",
          ingredient: "성분",
          functional: "기능성"
        }
      },
      "en": {
        scanTitle: "Scan",
        detailTitle: "Details",
        searchBtn: "Search",
        cameraBtn: "Open Camera",
        loading: "Searching...",
        cameraLoading: "Starting camera...",
        alertDbMissing: "This product is not yet in our database. Please try another product or enter the barcode manually.",
        alertScanMismatch: "Barcode detected, but product information could not be matched.",
        alertCameraError: "Unable to start camera. Please check browser camera permissions.",
        alertUnknown: "An unknown error occurred.",
        placeholder: "Enter barcode manually",
        labels: {
          description: "Description",
          volume: "Volume",
          feature: "Features",
          usage: "How to use",
          caution: "Caution",
          tag: "Tags",
          ingredient: "Ingredients",
          functional: "Functional"
        }
      },
      "ja": {
        scanTitle: "スキャン",
        detailTitle: "詳細",
        searchBtn: "検索",
        cameraBtn: "カメラ起動",
        loading: "検索中...",
        cameraLoading: "カメラ準備中...",
        alertDbMissing: "この商品はまだデータベースに登録されていません。別の商品をスキャンするか、バーコードを直接入力してください。",
        alertScanMismatch: "バーコードは認識されましたが、商品情報と一致しませんでした。",
        alertCameraError: "カメラを起動できません。ブラウザのカメラ権限を確認してください。",
        alertUnknown: "不明なエラーが発生しました。",
        placeholder: "バーコード番号を直接入力",
        labels: {
          description: "説明",
          volume: "容量",
          feature: "特徴",
          usage: "使い方",
          caution: "注意",
          tag: "タグ",
          ingredient: "成分",
          functional: "機能性"
        }
      },
      "cn": {
        scanTitle: "扫描",
        detailTitle: "详情",
        searchBtn: "查询",
        cameraBtn: "开启摄像头",
        loading: "查询中...",
        cameraLoading: "准备摄像头...",
        alertDbMissing: "该商品尚未收录到数据库中。请尝试其他商品或手动输入条形码。",
        alertScanMismatch: "条码已识别，但未能匹配到商品信息。",
        alertCameraError: "无法启动摄像头。请检查浏览器摄像头权限。",
        alertUnknown: "发生未知错误。",
        placeholder: "手动输入条形码",
        labels: {
          description: "说明",
          volume: "容量",
          feature: "特点",
          usage: "用法",
          caution: "注意",
          tag: "标签",
          ingredient: "成分",
          functional: "功能性"
        }
      },
      "tw": {
        scanTitle: "掃描",
        detailTitle: "詳情",
        searchBtn: "查詢",
        cameraBtn: "開啟攝像頭",
        loading: "查詢中...",
        cameraLoading: "準備攝像頭...",
        alertDbMissing: "此商品尚未收錄到資料庫中。請嘗試其他商品或手動輸入條碼。",
        alertScanMismatch: "條碼已辨識，但無法匹配商品資訊。",
        alertCameraError: "無法啟動攝像頭。請檢查瀏覽器攝像頭權限。",
        alertUnknown: "發生未知錯誤。",
        placeholder: "手動輸入條碼",
        labels: {
          description: "說明",
          volume: "容量",
          feature: "特色",
          usage: "用法",
          caution: "注意",
          tag: "標籤",
          ingredient: "成分",
          functional: "功能性"
        }
      }
    };

    function getCurrentLang() {
      return localStorage.getItem("lang") || "en";
    }

    function t() {
      return translations[getCurrentLang()] || translations["en"];
    }

    function resetScanState() {
      barcodeInput.value = "";
      statusMessage.textContent = "";
      statusMessage.classList.add("hidden");
    }

    function renderProduct(data) {
      const text = t();
      const lang = getCurrentLang();
      const common = data.common || {};
      const langData = data[lang] || data.en || data.ko || {};

      document.getElementById("label-description").textContent = text.labels.description;
      document.getElementById("label-volume").textContent = text.labels.volume;
      document.getElementById("label-feature").textContent = text.labels.feature;
      document.getElementById("label-usage").textContent = text.labels.usage;
      document.getElementById("label-caution").textContent = text.labels.caution;
      document.getElementById("label-tag").textContent = text.labels.tag;
      document.getElementById("label-ingredient").textContent = text.labels.ingredient;
      document.getElementById("label-functional").textContent = text.labels.functional;

      productBrand.textContent = common.brand || "-";
      productName.textContent = langData.name || "-";
      productCategoryChip.textContent = common.category || "-";

      if (common.spf_pa) {
        productSpfChip.textContent = common.spf_pa;
        productSpfChip.classList.remove("hidden");
      } else {
        productSpfChip.classList.add("hidden");
      }

      productSummary.textContent = langData.summary || "-";
      productDescription.textContent = langData.desc || langData.description || "-";
      productVolume.textContent = langData.volume || "-";
      productFeature.textContent = langData.feature || langData.features || "-";
      productUsage.textContent = langData.usage || "-";
      productCaution.textContent = langData.caution || langData.cautions || "-";
      productTag.textContent = langData.tag || langData.tags || "-";
      productIngredient.textContent = langData.ingredient || langData.ingredients || "-";

      if (langData.functional) {
        productFunctional.textContent = langData.functional;
        sectionFunctional.classList.remove("hidden");
      } else {
        sectionFunctional.classList.add("hidden");
      }
    }

    async function searchProductByBarcode(isFromScan = false) {
      const barcode = barcodeInput.value.trim();
      const text = t();

      if (!barcode) return;

      statusMessage.textContent = text.loading;
      statusMessage.classList.remove("hidden", "error");
      searchBtn.disabled = true;

      try {
        const snapshot = await db.ref('products/' + barcode).get();

        if (snapshot.exists()) {
          renderProduct(snapshot.val());
          statusMessage.classList.add("hidden");
          showScreen(detailScreen);
          await stopScanning();
          return;
        }

        if (isFromScan) {
          statusMessage.textContent = text.alertScanMismatch + " " + text.alertDbMissing;
        } else {
          statusMessage.textContent = text.alertDbMissing;
        }

        statusMessage.classList.remove("hidden");
        statusMessage.classList.add("error");

      } catch (err) {
        console.error("Search Error:", err);
        statusMessage.textContent = text.alertUnknown;
        statusMessage.classList.remove("hidden");
        statusMessage.classList.add("error");
      } finally {
        searchBtn.disabled = false;
        if (!readerElement.style.display || readerElement.style.display === "none") {
          isProcessingScan = false;
        }
      }
    }

    async function startScanning() {
      const text = t();
      statusMessage.textContent = text.cameraLoading;
      statusMessage.classList.remove("hidden", "error");
      isProcessingScan = false;
      
      try {
        if (html5QrCode) {
          try { await html5QrCode.stop(); } catch (e) {}
        }
        
        html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
          fps: 20, 
          qrbox: { width: 280, height: 160 },
          videoConstraints: {
            facingMode: "environment",
            focusMode: "continuous",
            width: { min: 640, ideal: 1280 },
            height: { min: 480, ideal: 720 }
          }
        };

        scanPlaceholder.classList.add("hidden");
        readerElement.style.display = "block";
        startCameraBtn.classList.add("hidden");

        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          (decodedText) => {
            if (isProcessingScan) return;
            isProcessingScan = true;
            barcodeInput.value = decodedText;
            searchProductByBarcode(true);
          }
        ).then(() => {
          statusMessage.classList.add("hidden");
        });

      } catch (err) {
        console.error("Camera Error:", err);
        statusMessage.textContent = text.alertCameraError;
        statusMessage.classList.remove("hidden");
        statusMessage.classList.add("error");
        scanPlaceholder.classList.remove("hidden");
        readerElement.style.display = "none";
        startCameraBtn.classList.remove("hidden");
        isProcessingScan = false;
      }
    }

    async function stopScanning() {
      if (html5QrCode && html5QrCode.isScanning) {
        await html5QrCode.stop().then(() => {
          scanPlaceholder.classList.remove("hidden");
          readerElement.style.display = "none";
          startCameraBtn.classList.remove("hidden");
          isProcessingScan = false;
        }).catch(err => {
          console.warn("Stop Error:", err);
          isProcessingScan = false;
        });
      } else {
        isProcessingScan = false;
      }
    }

    function showScreen(screen) {
      [languageScreen, scanScreen, detailScreen].forEach(s => s.classList.add("hidden"));
      screen.classList.remove("hidden");
      window.scrollTo(0, 0);
      
      const text = t();

      if (screen === scanScreen) {
        document.getElementById("scan-title").textContent = text.scanTitle;
        document.getElementById("scan-guide-text").textContent = text.scanTitle + " - Scan the barcode.";
        searchBtn.textContent = text.searchBtn;
        barcodeInput.placeholder = text.placeholder;
        startCameraBtn.textContent = text.cameraBtn; 
      } else if (screen === detailScreen) {
        document.getElementById("detail-title").textContent = text.detailTitle;
      }
    }

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        localStorage.setItem("lang", btn.dataset.lang);
        resetScanState();
        showScreen(scanScreen);
      });
    });

    startCameraBtn.addEventListener("click", startScanning);
    searchBtn.addEventListener("click", () => searchProductByBarcode(false));
    barcodeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchProductByBarcode(false);
    });
    
    document.getElementById("change-language-from-scan").addEventListener("click", () => {
      stopScanning();
      resetScanState();
      showScreen(languageScreen);
    });

    document.getElementById("change-language-from-detail").addEventListener("click", () => {
      stopScanning();
      resetScanState();
      showScreen(languageScreen);
    });

    backToScanBtn.addEventListener("click", () => {
      stopScanning();
      resetScanState();
      showScreen(scanScreen);
    });

    newScanBtn.addEventListener("click", () => {
      resetScanState();
      showScreen(scanScreen);
    });

    function initApp() {
      if (localStorage.getItem("lang")) showScreen(scanScreen);
      else showScreen(languageScreen);
    }

    initApp();
  </script>
</body>
</html>
